<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fond circulaire bleu -->
  <circle cx="32" cy="32" r="30" fill="#1d4ed8"/>
  <!-- Bulle gauche (EN) -->
  <rect x="6" y="10" width="22" height="16" rx="4" fill="white" opacity="0.95"/>
  <text x="17" y="22" font-family="sans-serif" font-size="11" font-weight="bold"
        fill="#1d4ed8" text-anchor="middle">EN</text>
  <!-- Flèche centrale -->
  <path d="M 30 22 L 42 32 L 30 42" stroke="white" stroke-width="2.8"
        fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bulle droite (FR) -->
  <rect x="36" y="38" width="22" height="16" rx="4" fill="#fbbf24" opacity="0.95"/>
  <text x="47" y="50" font-family="sans-serif" font-size="11" font-weight="bold"
        fill="#1d4ed8" text-anchor="middle">FR</text>
</svg>
